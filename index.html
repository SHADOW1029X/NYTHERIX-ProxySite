// ---------- 1. D1 STORAGE EMULATION (settings table) ----------
// Original worker uses env.DB (D1) with SELECT target_url, enabled FROM settings WHERE id=1
// We implement identical behavior using localStorage + IndexedDB fallback for large data.
const STORAGE_KEY = '__nytherix_db_settings';

async function getConfigFromStorage() {
  // mimic D1 row: { target_url, enabled }
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && typeof parsed.target_url === 'string') {
        return {
          target_url: parsed.target_url,
          enabled: parsed.enabled !== undefined ? parsed.enabled : 1
        };
      }
    }
  } catch(e) { /* ignore */ }
  // default placeholder (no target yet) -> shows placeholder page like original
  return null;
}

// helper to update config from admin UI (original worker didn't have UI, but we need a way
// to replicate the D1 settings table. We add an invisible setter that can be called via console
// or by a tiny admin panel. To keep behavior 100% identical to original, the worker expects
// the row to exist. We'll manually seed a default target for demo, but also respect
// manual updates. The experience matches: if no target_url, show NYTHERIX placeholder.
let cachedConfig = null;
let cfgTimestamp = 0;
const CFG_TTL = 15000;

async function getConfig() {
  const now = Date.now();
  if (cachedConfig && (now - cfgTimestamp) < CFG_TTL) return cachedConfig;
  cachedConfig = await getConfigFromStorage();
  cfgTimestamp = now;
  if (!cachedConfig) {
    // For first-run or empty DB: we need to behave like original worker returning null.
    // Original worker shows placeholderPage() when config missing or target_url empty.
    return null;
  }
  return cachedConfig;
}

// Helper to manually set target (for admin / demo). This replicates D1 update.
window.__nytherixAdmin = {
  setTarget: function(url, enabled = true) {
    if (!url || typeof url !== 'string') return false;
    try {
      new URL(url); // validate
    } catch(e) { return false; }
    const config = { target_url: url, enabled: enabled ? 1 : 0 };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(config));
    cachedConfig = null;
    cfgTimestamp = 0;
    // reload page to re-run proxy fetch cycle
    location.reload();
    return true;
  },
  getTarget: function() {
    const cfg = localStorage.getItem(STORAGE_KEY);
    return cfg ? JSON.parse(cfg) : null;
  }

// ---------- 2. Original helper functions (STRING ESCAPE, COOKIE REWRITE, ETC) ----------
function escRe(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
}

function buildCorsHeaders(requestOrigin) {
  const origin = requestOrigin || "*";
  return {
    "Access-Control-Allow-Origin": origin,
    "Access-Control-Allow-Methods": "GET,POST,PUT,PATCH,DELETE,HEAD,OPTIONS",
    "Access-Control-Allow-Headers": "*",
    "Access-Control-Allow-Credentials": origin !== "*" ? "true" : "false",
    "Access-Control-Max-Age": "86400",
    ...(origin !== "*" ? { "Vary": "Origin" } : {}),
  };
}

function rewriteCookie(raw, proxyHost) {
  let out = raw
    .replace(/\bdomain=[^;,\s]+/gi, `domain=${proxyHost}`)
    .replace(/\bSameSite=Strict\b/gi, "SameSite=None")
    .replace(/\bSameSite=Lax\b/gi, "SameSite=None");
  if (!/\bSecure\b/i.test(out)) out += "; Secure";
  return out;
}

function applyCookies(srcHeaders, destHeaders, proxyHost) {
  const allCookies = srcHeaders.getSetCookie ? srcHeaders.getSetCookie() : [];
  if (allCookies.length) {
    destHeaders.delete("set-cookie");
    for (const c of allCookies) destHeaders.append("set-cookie", rewriteCookie(c, proxyHost));
  } else {
    const raw = srcHeaders.get("set-cookie");
    if (raw) destHeaders.set("set-cookie", rewriteCookie(raw, proxyHost));
  }
}

  return ct.includes("text/html") || ct.includes("text/css") ||
    ct.includes("javascript") || ct.includes("ecmascript") ||

// Main entry: intercept all fetch events (Service Worker style)
// self.addEventListener style but we attach to window and intercept page loads.
// Since this is a client-side proxy, we override the global fetch and navigation.
// We replicate worker logic: on each request (navigation or subresource) we apply
// the proxy behavior exactly.
(function installProxyInterceptor() {
  const originalFetch = window.fetch;
  window.fetch = async function(input, init) {
    // proxy logic using current configuration
    const config = await getConfig();
    if (!config || !config.enabled || !config.target_url) {
      return originalFetch.call(this, input, init);
    }

    let targetBase = config.target_url.replace(/\/$/, '');
    let proxyOrigin = location.origin;
    let targetHost = new URL(targetBase).hostname;
    let proxyHost = location.hostname;

    let rewrittenUrl = requestUrl;
    if (requestUrl.startsWith(proxyOrigin)) {
      rewrittenUrl = targetBase + requestUrl.slice(proxyOrigin.length);
